<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Track &amp; Tote</title>
    <style>
      :root {
        color-scheme: light;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100svh;
        display: grid;
        place-items: center;
        background: #f6f2e9;
        color: #17201d;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      main {
        width: min(680px, calc(100% - 40px));
        padding: 40px 28px;
        border: 1px solid rgba(23, 32, 29, 0.16);
        border-radius: 8px;
        background: #fffdf8;
      }

      h1 {
        margin: 0;
        font-size: clamp(2rem, 5vw, 3rem);
        line-height: 1.05;
      }

      p {
        margin: 14px 0 0;
        color: #4f5d58;
        font-size: 1rem;
        line-height: 1.6;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Track &amp; Tote</h1>
      <p>Clean reset complete. New article and design direction will be published here next.</p>
    </main>
  </body>
</html>
